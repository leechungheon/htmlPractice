<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	body{
		text-align: center;
	}
	img{
		border: 1px solid black;
		width: 200px;
		height: 200px;
		margin: 10px;
		box-shadow: 8px 8px 4px pink;
	}
	img:hover{
		opacity: 0.3;
	}
	h1{
		line-height: 150px;
		border-radius: 20px;
		background-image: linear-gradient(to right, red, orange, yellow, green, blue, navy, purple);
		width: 25%;
		margin-left: auto;
		margin-right: auto;
	}
	h1>span{
		color:white;
	}
</style>
</head>
<body>
<h1>날씨<span>의 종류</span></h1>
<hr>
<img src="../images/sun.png">
<img src="../images/rain.png">
<img src="../images/cloud.png"><br>
<img src="../images/cloud_sun.png">
<img src="../images/snow.png">
<img src="../images/etc.png">
</body>
</html>
