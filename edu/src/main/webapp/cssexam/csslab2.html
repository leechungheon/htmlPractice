<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	h1{
		text-shadow: 4px 4px 6px gray;
	}
	input{
		border-radius: 8px;
		padding: 3px;
	}
</style>
</head>
<body>
<h1>회원 정보를 입력하십시오.</h1>
<hr>
<input type="text" name="name" placeholder="이름을 입력하세요"><br>
<input type="tel" name="tel" placeholder="전화번호를 입력하세요"><br>
<input type="text" name="id" placeholder="계정을 입력하세요"><br>
<input type="password" name="password" placeholder="패스워드를 입력하세요"><br>
<br>
<input class="btn" type="submit" value="등록">
<input class="btn" type="reset" value="재작성">
</body>
</html>
