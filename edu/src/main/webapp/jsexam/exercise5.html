<script>
	function sum(a){
		let sum=0;
		if(a==undefined)return;
		for(let i=1; i<=a; i++){
			sum+=i;
		}
		return sum;
	}
	for(let i=1; i<=5; i++){
		let rnd=Math.floor(Math.random()*6);
		let result = 0;
		if(rnd!=0){
			result = sum(rnd);
		}else{
			result = sum();
		}
		
		if(result==undefined){
			document.write("<h2>호출 결과값 : "+result+"</h2><br>");

		}
	}
	
</script>
