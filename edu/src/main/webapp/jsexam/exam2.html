<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>JavaScript의 변수 선언과 활용(1)</h1>
<script>
	document.writeln(123);
	document.writeln(v1+"<br>");	// 오류 발생 - 선언되지 않은 변수 v1
	document.writeln(456); // -> 이 스크립트 실행 안됨
</script>
<hr>
<script>
	var v1;  // let, const
	document.writeln(v1+"<br>"); // -> 초기화되지 않아 undefined
	v1 = 100;
	document.writeln(v1+"<br>");
	v1 = '가나다'; // String
	document.writeln(v1+"<br>");	
	var v1 = true;
	document.writeln(v1+"<br>");	
	v1 = 123;
	document.writeln(v1+45+"<br>");	
	v1 = '123';
	document.writeln(v1+45+"<br>");	
</script>
<hr>
<script>
	document.writeln(v1+"<br>");	
</script>
</body>
</html>
