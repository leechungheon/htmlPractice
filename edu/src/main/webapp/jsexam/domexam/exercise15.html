<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	body{
		text-align: center;
	}
	button{
		border: 1.5px solid blue;
		border-radius: 10px;
		background-color: white;
		padding: 10px 20px;
	}
</style>
</head>
<body>
<h1 onclick="openSite()">구구단</h1>
<button>1단</button>
<button>2단</button>
<button>3단</button>
<button>4단</button>
<button>5단</button>
<button>6단</button>
<button>7단</button>
<button>8단</button>
<button>9단</button>
<p></p>
<script>
	const doms = document.querySelectorAll("button");
	const pTag = document.querySelector("p");
	for(let i=0; i<doms.length; i++){
		doms[i].addEventListener("click", gugudan);
	}
	function openSite(){
		window.open("https://ko.wikipedia.org/wiki/구구단");
	}
	function gugudan(e){
		let text = e.target.innerText;
		let num = parseInt(text);
		pTag.innerHTML=`${num}단 출력<br>`;
		for(let i=1; i<=9; i++){
			pTag.innerHTML+=`${num} x ${i} = ${num*i}<br>`;
		}
	}
</script>
</body>
</html>
